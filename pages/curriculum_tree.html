<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curriculum Tree</title>
  <link rel="stylesheet" href="../plugins/bootstrap/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../plugins/icons/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f5f7fb; }
    .level-group { margin-bottom: 0.9rem; }
    .level-title { font-weight: 700; margin-bottom: 0.2rem; }
    .subject-line { margin: 0; padding-left: 0.4rem; color: #3d4654; }
    .subject-line + .subject-line { margin-top: 0.1rem; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <h4 class="mb-1" id="title">Curriculum</h4>
        <p class="text-muted mb-0" id="description"></p>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body py-3" id="levelsContainer"></div>
    </div>

    <div id="emptyState" class="alert alert-warning d-none" role="alert">
      No levels found for this curriculum.
    </div>

    <div id="errorState" class="alert alert-danger d-none" role="alert"></div>
  </div>

  <script src="../jquery/jquery.min.js"></script>
  <script src="../jsfile/curriculum_tree.js"></script>
</body>
</html>
