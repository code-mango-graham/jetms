<!-- ============================= -->
<!-- BEGIN CURRICULUM MANAGEMENT -->
<!-- ============================= -->

<div class="card card-primary card-outline">

    <!-- CARD HEADER -->
    <div class="card-header">
        <h3 class="card-title fs-3 fw-bold">Curriculum Management</h3>

        <div class="card-tools">
            <button class="btn btn-info btn-sm" id="btnAdd">
                <i class="fas fa-plus"></i> Add Curriculum
            </button>
        </div>
    </div>

    <!-- ============================= -->
    <!-- BEGIN MODAL -->
    <!-- ============================= -->
    <div class="modal fade" id="curriculumModal">

        <div class="modal-dialog">
            <div class="modal-content">

                <form id="curriculumForm">

                    <!-- MODAL HEADER -->
                    <div class="modal-header">
                        <h4 class="modal-title">Curriculum</h4>
                    </div>

                    <!-- MODAL BODY -->
                    <div class="modal-body">

                        <input type="hidden" id="curriculum_id" name="curriculum_id">

                        <div class="form-group">
                            <label for="curriculum_name">Curriculum Name</label>
                            <input type="text" class="form-control" id="curriculum_name" name="curriculum_name" required>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" class="form-control" id="description" name="description" required>
                        </div>

                        <div class="form-group">
                            <label for="status">Status</label>
                            <select class="form-control" id="status" name="status">
                                <option value="1">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>

                    </div>

                    <!-- MODAL FOOTER -->
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">
                            Save
                        </button>

                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Close
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
    <!-- ============================= -->
    <!-- END MODAL -->
    <!-- ============================= -->

    <!-- TABLE CARD BODY -->
    <div class="card-body">
        <table id="curriculumTable" class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>Curriculum Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th width="150">Actions</th>
                </tr>
            </thead>
        </table>
    </div>

</div>

<!-- ============================= -->
<!-- END CURRICULUM MANAGEMENT -->
<!-- ============================= -->

<script src="jsfile/curriculum.js"></script>
