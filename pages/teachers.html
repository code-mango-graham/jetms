<div class="app-content-header">
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-6">
        <h3 class="mb-0">Teachers</h3>
      </div>
      <div class="col-sm-6">
        <ol class="breadcrumb float-sm-end">
          <li class="breadcrumb-item"><a href="#">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Teachers</li>
        </ol>
      </div>
    </div>
  </div>
</div>

<div class="app-content px-4">
  <div class="container-fluid">
    <div class="row">
      <div class="modal fade" id="teacherModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Add Teacher</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <form id="teacherForm">
                <input type="hidden" id="teacher_id" name="teacher_id">
                <div class="row g-3">
                  <div class="col-md-4">
                    <label class="form-label" for="last_name">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" required>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="first_name">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" required>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="middle_name">Middle Name</label>
                    <input type="text" class="form-control" id="middle_name" name="middle_name">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="extension_name">Extension Name</label>
                    <input type="text" class="form-control" id="extension_name" name="extension_name">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="nick_name">Nickname / Alias</label>
                    <input type="text" class="form-control" id="nick_name" name="nick_name">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="gender">Gender</label>
                    <select class="form-select select2" id="gender" name="gender" required>
                      <option value="">-- Select Gender --</option>
                      <option value="Male">Male</option>
                      <option value="Female">Female</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="birthday">Date of Birth</label>
                    <input type="date" class="form-control" id="birthday" name="birthday" required>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="date_hired">Date Hired</label>
                    <input type="date" class="form-control" id="date_hired" name="date_hired">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="phone_number">Phone Number</label>
                    <input type="text" class="form-control" id="phone_number" name="phone_number">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="position_id">Position Title</label>
                    <select class="form-select select2" id="position_id" name="position_id" required>
                      <option value="">-- Select Position --</option>
                    </select>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" for="department_id">Department / Unit</label>
                    <select class="form-select select2" id="department_id" name="department_id" required>
                      <option value="">-- Select Department --</option>
                    </select>
                  </div>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" form="teacherForm" class="btn btn-primary">Save</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div class="card-header d-flex align-items-center">
          <h3 class="card-title mb-0">Teacher List</h3>
          <div class="card-tools ms-auto d-flex gap-2">
            <button type="button" class="btn btn-outline-primary btn-sm" id="btnAddTeacher">
              <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>Add
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="refreshTeachers">
              <i class="bi bi-arrow-clockwise me-1" aria-hidden="true"></i>Refresh
            </button>
          </div>
        </div>
        <div class="card-body">
          <table id="teachersTable" name="teachersTable" class="table table-bordered nowrap w-100">
            <thead>
              <tr>
                <th>Last Name</th>
                <th>First Name</th>
                <th>Middle Name</th>
                <th>Extension Name</th>
                <th>Nickname/Alias</th>
                <th>Gender</th>
                <th>Birthday</th>
                <th>Position Title</th>
                <th>Office</th>
                <th>Date Hired</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="jsfile/teachers.js"></script>
<script>
$(document).ready(function () {
  $('.select2').select2({
    width: '100%',
    placeholder: 'Search and select',
    allowClear: true
  });

  $('#teacherModal').on('shown.bs.modal', function () {
    $('#teacherModal .select2').select2({
      width: '100%',
      dropdownParent: $('#teacherModal')
    });
  });
});
</script>
