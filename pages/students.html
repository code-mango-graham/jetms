<div class="app-content-header">
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-6">
        <h3 class="mb-0">Students</h3>
      </div>
      <div class="col-sm-6">
        <ol class="breadcrumb float-sm-end">
          <li class="breadcrumb-item"><a href="#">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Students</li>
        </ol>
      </div>
    </div>
  </div>
</div>

<div class="app-content px-4">
  <div class="container-fluid">
    <div class="row">
      <!-- Student Modal -->
      <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Add Student</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <form id="studentForm">
                <input type="hidden" id="student_id" name="student_id">
                  
                  <!-- Basic Information -->
                  <div class="row g-3">
                    <div class="col-md-2">
                      <label for="lrn" class="form-label">LRN</label>
                      <input type="text" class="form-control" id="lrn" name="lrn" placeholder="Enter LRN">
                    </div>
                    <div class="col-md-3">
                      <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="last_name" name="last_name" required placeholder="Enter last name">
                    </div>
                    <div class="col-md-3">
                      <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="first_name" name="first_name" required placeholder="Enter first name">
                    </div>
                    <div class="col-md-2">
                      <label for="middle_name" class="form-label">Middle Name</label>
                      <input type="text" class="form-control" id="middle_name" name="middle_name" placeholder="Enter middle name">
                    </div>
                    <div class="col-md-2">
                      <label for="extension_name" class="form-label">Extension</label>
                      <input type="text" class="form-control" id="extension_name" name="extension_name" placeholder="Jr., Sr., III, etc.">
                    </div>
                  </div>

                  <div class="row g-3">
                    <div class="col-md-2">
                      <label for="middle_initial" class="form-label">M.I.</label>
                      <input type="text" class="form-control" id="middle_initial" name="middle_initial" maxlength="2" placeholder="e.g., A">
                    </div>
                    <div class="col-md-2">
                      <label for="sex" class="form-label">Sex</label>
                      <select class="form-select" id="sex" name="sex">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                      </select>
                    </div>
                    <div class="col-md-3">
                      <label for="birthday" class="form-label">Birthday</label>
                      <input type="date" class="form-control" id="birthday" name="birthday">
                    </div>
                    <div class="col-md-3">
                      <label for="cp_no" class="form-label">CP No.</label>
                      <input type="text" class="form-control" id="cp_no" name="cp_no" placeholder="09XX-XXX-XXXX">
                    </div>
                    <div class="col-md-2">
                      <label for="student_status" class="form-label">Status</label>
                      <select class="form-select" id="student_status" name="student_status">
                        <option value="active">Active</option>
                        <option value="enrolled">Enrolled</option>
                        <option value="inactive">Inactive</option>
                        <option value="transferred">Transferred</option>
                        <option value="graduated">Graduated</option>
                        <option value="archived">Archived</option>
                        <option value="deceased">Deceased</option>
                      </select>
                    </div>
                  </div>

                  <div class="row g-3">
                    <div class="col-md-4">
                      <label for="spoken_language" class="form-label">Spoken Language</label>
                      <input type="text" class="form-control" id="spoken_language" name="spoken_language" placeholder="e.g., English, Filipino">
                    </div>
                    <div class="col-md-4">
                      <label for="fb_name" class="form-label">FB Name</label>
                      <input type="text" class="form-control" id="fb_name" name="fb_name" placeholder="Enter Facebook name">
                    </div>
                    <div class="col-md-4">
                      <label for="esc_id_no" class="form-label">ESC ID No.</label>
                      <input type="text" class="form-control" id="esc_id_no" name="esc_id_no" placeholder="Enter ESC ID number">
                    </div>
                  </div>

                  <div class="row g-3">
                    <div class="col-12">
                      <label for="former_school" class="form-label">Former School</label>
                      <input type="text" class="form-control" id="former_school" name="former_school" placeholder="Enter former school name">
                    </div>
                  </div>

                  <!-- Parent Information -->
                  <h6 class="mt-4 mb-2 border-bottom pb-2">Parent Information</h6>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="father_name" class="form-label">Father's Name</label>
                      <input type="text" class="form-control" id="father_name" name="father_name" placeholder="Enter father's name">
                    </div>
                    <div class="col-md-6">
                      <label for="mother_name" class="form-label">Mother's Name</label>
                      <input type="text" class="form-control" id="mother_name" name="mother_name" placeholder="Enter mother's name">
                    </div>
                  </div>

                  <!-- Contact Information -->
                  <h6 class="mt-4 mb-2 border-bottom pb-2">Contact Information</h6>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="contact_person" class="form-label">Contact Person</label>
                      <input type="text" class="form-control" id="contact_person" name="contact_person" placeholder="Enter contact person name">
                    </div>
                    <div class="col-md-6">
                      <label for="contact_fb_name" class="form-label">Facebook Name</label>
                      <input type="text" class="form-control" id="contact_fb_name" name="contact_fb_name" placeholder="Enter Facebook name">
                    </div>
                  </div>

                  <div class="row g-3">
                    <div class="col-md-6">
                      <label for="contact_cp_no" class="form-label">Contact Number</label>
                      <input type="text" class="form-control" id="contact_cp_no" name="contact_cp_no" placeholder="09XX-XXX-XXXX">
                    </div>
                  </div>

                  <!-- Address -->
                  <h6 class="mt-4 mb-2 border-bottom pb-2">Address</h6>
                  <div class="row g-3">
                    <div class="col-12">
                      <label for="street_name" class="form-label">Street Name/Purok/Subdivision</label>
                      <input type="text" class="form-control" id="street_name" name="street_name" placeholder="Enter street name/purok/subdivision">
                    </div>
                  </div>

                  <div class="row g-3">
                    <div class="col-md-4">
                      <label for="province" class="form-label">Province</label>
                      <select class="form-select select2" id="province" name="province" style="width: 100%;">
                        <option value="">-- Select Province --</option>
                      </select>
                    </div>
                    <div class="col-md-4">
                      <label for="municipality" class="form-label">Municipality/City</label>
                      <select class="form-select select2" id="municipality" name="municipality" style="width: 100%;">
                        <option value="">-- Select Municipality --</option>
                      </select>
                    </div>
                    <div class="col-md-4">
                      <label for="barangay" class="form-label">Barangay</label>
                      <select class="form-select select2" id="barangay" name="barangay" style="width: 100%;">
                        <option value="">-- Select Barangay --</option>
                      </select>
                    </div>
                  </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="studentForm" class="btn btn-primary">Save</button>
              </div>
            </div>
          </div>
        </div>
      </form>
      <!-- Students Table Card -->
      <div class="card" style="padding:0;">
        <div class="card-header d-flex align-items-center">
          <h3 class="card-title mb-0">Student List</h3>
          <div class="card-tools ms-auto d-flex gap-2">
            <select class="form-select form-select-sm" id="statusFilter" style="width: 200px;">
              <option value="">-- All Status --</option>
              <option value="active">Active/Enrolled</option>
              <option value="inactive">Inactive</option>
              <option value="transferred">Transferred</option>
              <option value="graduated">Graduated</option>
              <option value="archived">Archived</option>
              <option value="deceased">Deceased</option>
            </select>
            <button type="button" class="btn btn-outline-primary btn-sm" id="btnAddStudent">
              <i class="bi bi-plus-circle me-1"></i>Add
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="refreshStudents">
              <i class="bi bi-arrow-clockwise me-1"></i>Refresh
            </button>
          </div>
        </div>
        <div class="card-body">
          <table id="studentsTable" class="table table-bordered table-hover nowrap w-100">
            <thead>
              <tr>
                <th>LRN</th>
                <th>Last Name</th>
                <th>First Name</th>
                <th>Birthday</th>
                <th>Sex</th>
                <th>Status</th>
                <th width="100">Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="jsfile/student.js"></script>
