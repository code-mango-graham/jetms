<div class="app-content-header">
          <!--begin::Container-->
          <div class="container-fluid">
            <!--begin::Row-->
            <div class="row">
              <div class="col-sm-6">
                <h3 class="mb-0">Students</h3>
              </div>
              <div class="col-sm-6">
                <ol class="breadcrumb float-sm-end">
                  <li class="breadcrumb-item"><a href="#">Home</a></li>
                  <li class="breadcrumb-item active" aria-current="page">Students</li>
                </ol>
              </div>
            </div>
            <!--end::Row-->
          </div>
          <!--end::Container-->
        </div>
        <!--end::App Content Header-->
        <!--begin::App Content-->
        <div class="app-content">
          <!--begin::Container-->
          <div class="container-fluid">
            <!-- Active School Year -->
            <div class="row mb-3">
              <div class="col-12">
                <div class="alert alert-info">
                  <strong>Active School Year:</strong> <span id="activeSchoolYear">Loading...</span>
                </div>
              </div>
            </div>

            <!-- Filter and Action Section -->
            <div class="row mb-3">
              <div class="col-md-6">
                <label for="statusFilter" class="form-label">Student Status</label>
                <select class="form-select" id="statusFilter">
                  <option value="">-- All Status --</option>
                  <option value="active">Active/Enrolled</option>
                  <option value="inactive">Inactive</option>
                  <option value="transferred">Transferred</option>
                  <option value="graduated">Graduated</option>
                  <option value="archived">Archived</option>
                  <option value="deceased">Deceased</option>
                </select>
              </div>
              <div class="col-md-6">
                <button class="btn btn-primary mt-4" id="btnAddStudent">
                  <i class="bi bi-plus-circle"></i> Add New Student
                </button>
              </div>
            </div>

            <!--begin::Row-->
            <div class="row">
              <div class="col-12">
                <div class="card">
                  <div class="card-body">
                    <table class="table table-striped table-hover" id="studentsTable">
                      <thead>
                        <tr>
                          <th>LRN</th>
                          <th>Last Name</th>
                          <th>First Name</th>
                          <th>Birthday</th>
                          <th>Sex</th>
                          <th>Status</th>
                          <th>Actions</th>
                        </tr>
                      </thead>
                      <tbody></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
            <!--end::Row-->
          </div>
          <!--end::Container-->
        </div>
        <!--end::App Content-->

        <!-- Student Modal -->
        <div class="modal fade" id="studentModal" tabindex="-1" aria-labelledby="studentModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="studentModalLabel">Add Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <form id="studentForm">
                  <input type="hidden" id="studentId" value="">
                  
                  <!-- Basic Information -->
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label for="lrn" class="form-label">LRN (Learner Reference Number)</label>
                      <input type="text" class="form-control" id="lrn" name="lrn">
                    </div>
                    <div class="col-md-6 mb-3">
                      <label for="birthday" class="form-label">Birthday</label>
                      <input type="date" class="form-control" id="birthday" name="birthday">
                    </div>
                  </div>

                  <div class="row">
                    <div class="col-md-3 mb-3">
                      <label for="last_name" class="form-label">Last Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="last_name" name="last_name" required>
                    </div>
                    <div class="col-md-3 mb-3">
                      <label for="first_name" class="form-label">First Name <span class="text-danger">*</span></label>
                      <input type="text" class="form-control" id="first_name" name="first_name" required>
                    </div>
                    <div class="col-md-3 mb-3">
                      <label for="middle_name" class="form-label">Middle Name</label>
                      <input type="text" class="form-control" id="middle_name" name="middle_name">
                    </div>
                    <div class="col-md-3 mb-3">
                      <label for="extension_name" class="form-label">Extension Name</label>
                      <input type="text" class="form-control" id="extension_name" name="extension_name">
                    </div>
                  </div>

                  <div class="row">
                    <div class="col-md-2 mb-3">
                      <label for="middle_initial" class="form-label">Middle Initial</label>
                      <input type="text" class="form-control" id="middle_initial" name="middle_initial" maxlength="2">
                    </div>
                    <div class="col-md-2 mb-3">
                      <label for="sex" class="form-label">Sex</label>
                      <select class="form-select" id="sex" name="sex">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                      </select>
                    </div>
                    <div class="col-md-4 mb-3">
                      <label for="cp_no" class="form-label">CP No.</label>
                      <input type="text" class="form-control" id="cp_no" name="cp_no">
                    </div>
                    <div class="col-md-4 mb-3">
                      <label for="spoken_language" class="form-label">Spoken Language</label>
                      <input type="text" class="form-control" id="spoken_language" name="spoken_language">
                    </div>
                  </div>

                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label for="fb_name" class="form-label">FB Name</label>
                      <input type="text" class="form-control" id="fb_name" name="fb_name">
                    </div>
                    <div class="col-md-6 mb-3">
                      <label for="esc_id_no" class="form-label">ESC ID No. (If from private school)</label>
                      <input type="text" class="form-control" id="esc_id_no" name="esc_id_no">
                    </div>
                  </div>

                  <div class="row">
                    <div class="col-12 mb-3">
                      <label for="former_school" class="form-label">Former School</label>
                      <input type="text" class="form-control" id="former_school" name="former_school">
                    </div>
                  </div>

                  <!-- Parent Information -->
                  <h6 class="mt-3 mb-2">Parent Information</h6>
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label for="father_name" class="form-label">Father's Name</label>
                      <input type="text" class="form-control" id="father_name" name="father_name">
                    </div>
                    <div class="col-md-6 mb-3">
                      <label for="mother_name" class="form-label">Mother's Name</label>
                      <input type="text" class="form-control" id="mother_name" name="mother_name">
                    </div>
                  </div>

                  <!-- Contact Information -->
                  <h6 class="mt-3 mb-2">Contact Information</h6>
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label for="contact_person" class="form-label">Contact Person</label>
                      <input type="text" class="form-control" id="contact_person" name="contact_person">
                    </div>
                    <div class="col-md-6 mb-3">
                      <label for="contact_fb_name" class="form-label">Contact FB Name</label>
                      <input type="text" class="form-control" id="contact_fb_name" name="contact_fb_name">
                    </div>
                  </div>

                  <!-- Address -->
                  <h6 class="mt-3 mb-2">Address</h6>
                  <div class="row">
                    <div class="col-12 mb-3">
                      <label for="street_name" class="form-label">Street Name/Purok/Subdivision</label>
                      <input type="text" class="form-control" id="street_name" name="street_name">
                    </div>
                  </div>

                  <div class="row">
                    <div class="col-md-4 mb-3">
                      <label for="province" class="form-label">Province</label>
                      <select class="form-select" id="province" name="province">
                        <option value="">-- Select Province --</option>
                      </select>
                    </div>
                    <div class="col-md-4 mb-3">
                      <label for="municipality" class="form-label">Municipality/City</label>
                      <select class="form-select" id="municipality" name="municipality">
                        <option value="">-- Select Municipality --</option>
                      </select>
                    </div>
                    <div class="col-md-4 mb-3">
                      <label for="barangay" class="form-label">Barangay</label>
                      <select class="form-select" id="barangay" name="barangay">
                        <option value="">-- Select Barangay --</option>
                      </select>
                    </div>
                  </div>

                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label for="contact_cp_no" class="form-label">Contact CP Number</label>
                      <input type="text" class="form-control" id="contact_cp_no" name="contact_cp_no">
                    </div>
                    <div class="col-md-6 mb-3">
                      <label for="student_status" class="form-label">Student Status</label>
                      <select class="form-select" id="student_status" name="student_status">
                        <option value="active">Active/Enrolled</option>
                        <option value="inactive">Inactive</option>
                        <option value="transferred">Transferred</option>
                        <option value="graduated">Graduated</option>
                        <option value="archived">Archived</option>
                        <option value="deceased">Deceased</option>
                      </select>
                    </div>
                  </div>
                </form>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="btnSaveStudent">Save Student</button>
              </div>
            </div>
          </div>
        </div>
