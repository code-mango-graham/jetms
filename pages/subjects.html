<div class="card card-secondary">
    <div class="card-header">
        <h3 class="card-title fs-5">EDITING SUBJECTS</h3>
        <input type="hidden" class="form-control" id="activeLevelId" name="activeLevelId" value="">
        <div class="card-tools">
            <button type="button" class="btn btn-tool" id="btnclosecard" name="btnclosecard">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>

    <div class="card-body">
        <div class="alert alert-info py-2 d-flex justify-content-between align-items-center" role="alert">
            <div>
                <strong>Active Level:</strong>
                <span id="activeLevel">Loading...</span>
            </div>
            <button class="btn btn-outline-secondary btn-sm" id="btnAddSubject" type="button">
                <i class="bi bi-plus-circle me-1"></i>Add Subject
            </button>
        </div>
        <div class="table-responsive" style="overflow-x:auto;">
            <table id="subjectTable" class="table table-bordered table-hover compact nowrap w-100">
                <thead>
                    <tr>
                        <th>SUBJECT NAME</th>
                        <th>SUBJECT CODE</th>
                        <th width="100">ACTIONS</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <!-- ============================= -->
    <!-- BEGIN SUBJECT MODAL -->
    <!-- ============================= -->
    <div class="modal fade" id="subjectModal">

        <div class="modal-dialog">
            <div class="modal-content">

                <form id="subjectForm">

                    <!-- MODAL HEADER -->
                    <div class="modal-header">
                        <h4 class="modal-title">Add Subject</h4>
                    </div>

                    <!-- MODAL BODY -->
                    <div class="modal-body">

                        <input type="hidden" id="subject_id" name="subject_id">
                        
                        <div class="form-group mb-3">
                            <label for="subject_name">Subject Name</label>
                            <input type="text" class="form-control" id="subject_name" name="subject_name" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="subject_code">Subject Code</label>
                            <input type="text" class="form-control" id="subject_code" name="subject_code" required>
                        </div>

                    </div>

                    <!-- MODAL FOOTER -->
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">
                            Save
                        </button>

                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Close
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
    <!-- ============================= -->
    <!-- END SUBJECT MODAL -->
    <!-- ============================= -->

    <script src="jsfile/subject.js"></script>
</div>
