<!-- ============================= -->
<!-- BEGIN DEPARTMENT MANAGEMENT -->
<!-- ============================= -->

<div class="card card-primary card-outline">

    <!-- CARD HEADER -->
    <div class="card-header">
        <h3 class="card-title fs-3 fw-bold">OFFICE MANAGEMENT</h3>

        <div class="card-tools">
            <button class="btn btn-primary btn-sm" id="btnAdd">
                <i class="bi bi-plus-circle me-1"></i><B>Add Office</B>
            </button>
        </div>
    </div>

    <!-- ============================= -->
    <!-- BEGIN MODAL -->
    <!-- ============================= -->
    <div class="modal fade" id="departmentModal">

        <div class="modal-dialog">
            <div class="modal-content">

                <form id="departmentForm">

                    <!-- MODAL HEADER -->
                    <div class="modal-header">
                        <h4 class="modal-title">Office</h4>
                    </div>

                    <!-- MODAL BODY -->
                    <div class="modal-body">

                        <input type="hidden" id="department_id" name="department_id">

                        <div class="form-group">
                            <label for="department_name">Office Name</label>
                            <input type="text" class="form-control" id="department_name" name="department_name" required>
                        </div>
                    </div>

                    <!-- MODAL FOOTER -->
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">
                            Save
                        </button>

                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Close
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
    <!-- ============================= -->
    <!-- END MODAL -->
    <!-- ============================= -->

    <!-- TABLE CARD BODY -->
    <div class="card-body">
        <table id="departmentTable" class="table table-bordered table-hover compact">
            <thead>
                <tr>
                    <th>OFFICE NAME</th>
                    <th width="100">ACTIONS</th>
                </tr>
            </thead>
        </table>
    </div>

</div>

<!-- ============================= -->
<!-- END OFFICE MANAGEMENT -->
<!-- ============================= -->

<script src="jsfile/department.js"></script>
