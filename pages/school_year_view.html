<div class="card card-secondary card-outline mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h3 class="card-title mb-0">School Year Details</h3>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="btnCloseSchoolYearView">
            <i class="bi bi-x-lg me-1"></i>Close
        </button>
    </div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label mb-1">School Year</label>
                <div class="fw-semibold" id="view_schoolyear_name">-</div>
            </div>
            <div class="col-md-4">
                <label class="form-label mb-1">Curriculum</label>
                <div class="fw-semibold" id="view_curriculum_name">-</div>
            </div>
            <div class="col-md-4">
                <label class="form-label mb-1">Selected Level / Section</label>
                <div class="fw-semibold" id="view_active_path">Select level first</div>
            </div>
        </div>
        <input type="hidden" id="view_schoolyear_id" value="">
        <input type="hidden" id="view_curriculum_id" value="">
        <input type="hidden" id="view_level_id" value="">
        <input type="hidden" id="view_schoolyear_section_id" value="">
    </div>
</div>

<div class="card card-primary card-outline mb-3">
    <div class="card-header">
        <h3 class="card-title mb-0">Levels For School Year</h3>
    </div>
    <div class="card-body">
        <table id="syLevelsTable" class="table table-bordered table-hover compact nowrap w-100">
            <thead>
                <tr>
                    <th>LEVEL</th>
                    <th>CATEGORY</th>
                    <th width="120">ACTION</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<div class="card card-info card-outline mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h3 class="card-title mb-0">Sections</h3>
        <button class="btn btn-info btn-sm" id="btnAddSySection" disabled>
            <i class="bi bi-plus-lg me-1"></i>Add Section
        </button>
    </div>
    <div class="card-body">
        <table id="sySectionsTable" class="table table-bordered table-hover compact nowrap w-100">
            <thead>
                <tr>
                    <th>SECTION NAME</th>
                    <th width="180">ACTION</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<div class="card card-success card-outline">
    <div class="card-header">
        <h3 class="card-title mb-0">Subject Assignment Per Section</h3>
    </div>
    <div class="card-body">
        <table id="sySubjectAssignTable" class="table table-bordered table-hover compact nowrap w-100">
            <thead>
                <tr>
                    <th>SUBJECT CODE</th>
                    <th>SUBJECT NAME</th>
                    <th>ASSIGNED TEACHER</th>
                    <th>SCHEDULE</th>
                    <th>ROOM #</th>
                    <th width="120">ACTION</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<div class="modal fade" id="sySectionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="sySectionForm">
                <div class="modal-header">
                    <h5 class="modal-title">Section</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="schoolyear_section_id" name="schoolyear_section_id">
                    <div class="mb-3">
                        <label for="sy_section_name" class="form-label">Section Name</label>
                        <input type="text" id="sy_section_name" name="section_name" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="jsfile/school_year_view.js"></script>
